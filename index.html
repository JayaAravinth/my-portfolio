<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#F5EBD9" />

    <!-- Robots Meta -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Title & Description (VERY IMPORTANT FOR SEO) -->
    <title>Jayalakshmi K | Frontend React Developer Portfolio</title>
    <meta
      name="description"
      content="Frontend React Developer with 3+ years of experience building scalable, high-performance web applications using React, TypeScript, Redux, and GraphQL. View my portfolio of projects and hire me for your next project."
    />

    <!-- Keywords (optional but helpful) -->
    <meta
      name="keywords"
      content="Frontend Developer, React Developer, JavaScript, TypeScript, Redux, GraphQL, Web Developer, React Portfolio, Hire React Developer, India"
    />

    <!-- Author -->
    <meta name="author" content="Jayalakshmi K" />

    <!-- Canonical URL -->
    <link
      rel="canonical"
      href="https://my-portfolio-smoky-eight-63.vercel.app/"
    />

    <!-- Open Graph (LinkedIn / WhatsApp Preview) -->
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Jayalakshmi K | Frontend React Developer Portfolio" />
    <meta
      property="og:description"
      content="Frontend React Developer with 3+ years of experience building scalable, high-performance web applications using React, TypeScript, and Redux."
    />
    <meta
      property="og:url"
      content="https://my-portfolio-smoky-eight-63.vercel.app/"
    />
    <meta property="og:site_name" content="Jayalakshmi K Portfolio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jayalakshmi K | Frontend React Developer Portfolio" />
    <meta
      name="twitter:description"
      content="Frontend React Developer with expertise in React, TypeScript, Redux, and modern UI development. 3+ years of experience."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Inline critical CSS for faster initial render -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{background:#F5EBD9;color:#3a2b1e;margin:0;min-width:320px;font-family:'Inter',system-ui,-apple-system,sans-serif}
      #root{display:flex;min-height:100vh;flex-direction:column;width:100%}
    </style>

    <!-- Structured Data (Advanced SEO – Optional but Powerful) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Jayalakshmi K",
      "jobTitle": "Frontend React Developer",
      "description": "Frontend Developer with 3+ years of experience building scalable, high-performance web applications using React, TypeScript, and Redux",
      "url": "https://my-portfolio-smoky-eight-63.vercel.app/",
      "email": "jayaaravinth1001@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "India"
      },
      "knowsAbout": ["React.js", "TypeScript", "JavaScript", "Redux", "GraphQL", "Web Development", "Frontend Development"],
      "sameAs": [
        "https://www.linkedin.com/in/jayalakshmi27011998",
        "https://github.com/JayaAravinth"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
